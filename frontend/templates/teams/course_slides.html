{% extends "dashboard/base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'teams/css/course_slides.css' %}">

<div class="dashboard-container">
    <div class="page-header">
        <h2>Your Courses</h2>
    </div>

    <div class="course-grid">
        {% for course in courses %}
        <a href="{% url 'teams:course_teams' course.id %}" class="course-link">
            <div class="course-card">
                <!-- Banner with Initials like Teams -->
                <div class="card-banner">
                    {{ course.title|slice:":1"|upper }}
                </div>
                
                <div class="card-body">
                    <h3>{{ course.title }}</h3>
                </div>

                <div class="card-footer">
                    View Teams & Chat
                </div>
            </div>
        </a>
        {% empty %}
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #616161;">
            <p>No courses available at the moment.</p>
        </div>
        {% endfor %}
    </div>
</div>

<script src="{% static 'teams/js/course_slides.js' %}"></script>

{% endblock %}
