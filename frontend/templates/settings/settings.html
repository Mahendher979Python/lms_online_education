<!-- templates/settings/settings.html -->

{% extends 'dashboard/base.html' %}
{% load i18n %}

{% block content %}

<style>
body {
    --box-bg: rgba(30, 41, 59, 0.85);
    --box-border: rgba(255, 255, 255, 0.1);
    --box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    --label-color: #cbd5e1;
    --input-bg: rgba(15, 23, 42, 0.6);
    --input-color: #f8fafc;
    --input-border: rgba(255, 255, 255, 0.15);
    --header-text: #ffffff;
}

body.light {
    --box-bg: rgba(255, 255, 255, 0.95);
    --box-border: rgba(0, 0, 0, 0.08);
    --box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    --label-color: #475569;
    --input-bg: #ffffff;
    --input-color: #1e293b;
    --input-border: #cbd5e1;
    --header-text: #0f172a;
}


.settings-container{
    max-width:700px;
    margin:40px auto;
    background:var(--box-bg); border:1px solid var(--box-border);
    backdrop-filter: blur(10px);
    padding:35px;
    border-radius:20px;
    box-shadow:var(--box-shadow);
}

.settings-title{
    font-size:30px;
    font-weight:700;
    margin-bottom:30px;
    color:var(--header-text);
}

.switch-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
    border:1px solid var(--input-border);
    border-radius:14px;
    margin-bottom:18px;
    background:var(--input-bg);
}

.switch-row label{
    font-weight:600;
    color:var(--label-color);
}

.switch-row input{
    width:22px;
    height:22px;
    cursor:pointer;
}

.select-box{
    width:100%;
    padding:14px;
    border:1px solid var(--input-border);
    border-radius:12px;
    margin-bottom:20px;
    background:var(--input-bg);
    color:var(--input-color);
}

.save-btn{
    width:100%;
    background:linear-gradient(135deg, #3b82f6, #2563eb);
    color:white;
    border:none;
    padding:15px;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 15px rgba(59,130,246,0.3);
}

.save-btn:hover{
    background:linear-gradient(135deg, #2563eb, #1d4ed8);
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(59,130,246,0.4);
}

</style>

<div class="settings-container">

    <div class="settings-title">
        ⚙ Application Settings
    </div>

    <form method="POST">

        {% csrf_token %}

        <label>
            🌐 Language
        </label>

        <select name="language"
                class="select-box">

            <option value="en"
            {% if settings_obj.language == "en" %}
            selected
            {% endif %}
            >
                English
            </option>

            <option value="te"
            {% if settings_obj.language == "te" %}
            selected
            {% endif %}
            >
                Telugu
            </option>

            <option value="hi"
            {% if settings_obj.language == "hi" %}
            selected
            {% endif %}
            >
                Hindi
            </option>

        </select>

        <div class="switch-row">
            <label>🌙 Dark Mode</label>
            <input type="checkbox"
                   name="dark_mode"
                   {% if settings_obj.dark_mode %}
                   checked
                   {% endif %}>
        </div>

        <div class="switch-row">
            <label>📧 Email Notifications</label>
            <input type="checkbox"
                   name="email_notifications"
                   {% if settings_obj.email_notifications %}
                   checked
                   {% endif %}>
        </div>

        <div class="switch-row">
            <label>🔔 Push Notifications</label>
            <input type="checkbox"
                   name="push_notifications"
                   {% if settings_obj.push_notifications %}
                   checked
                   {% endif %}>
        </div>

        <div class="switch-row">
            <label>🔐 Two Factor Authentication</label>
            <input type="checkbox"
                   name="two_factor_auth"
                   {% if settings_obj.two_factor_auth %}
                   checked
                   {% endif %}>
        </div>

        <div class="switch-row">
            <label>💬 Allow Chat</label>
            <input type="checkbox"
                   name="allow_chat"
                   {% if settings_obj.allow_chat %}
                   checked
                   {% endif %}>
        </div>

        <button type="submit"
                class="save-btn">

            💾 Save Settings

        </button>

    </form>

</div>

{% endblock %}
