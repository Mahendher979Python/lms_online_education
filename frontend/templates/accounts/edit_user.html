{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}Edit Student{% endblock %}

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="{% static 'accounts/css/edit_user.css' %}">

<!-- Background gradient orbs -->
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<!-- Page wrapper to center form -->
<div class="page-wrapper">

    <div class="form-container">

        <div class="header-buttons">
            <a href="{% url 'manage_users' %}" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>

        <h2 class="form-title"><i class="fas fa-edit"></i> Edit Student</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text"
                       name="username"
                       value="{{ user_obj.username }}"
                       required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email"
                       name="email"
                       value="{{ user_obj.email }}"
                       required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text"
                       name="phone"
                       value="{{ user_obj.phone }}">
            </div>

            <div class="form-group">
                <label>Select Trainer</label>
                <select name="trainer" required>
                    <option value="">Select Trainer</option>
                    {% for trainer in trainers %}
                        <option value="{{ trainer.id }}"
                            {% if user_obj.trainer == trainer %}selected{% endif %}>
                            {{ trainer.username }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Select Courses</label>

                <div class="course-box">
                    {% for course in courses %}
                    <div class="course-item">
                        <input type="checkbox"
                               class="course-checkbox"
                               name="courses"
                               value="{{ course.id }}"
                               {% if course in user_obj.courses.all %}checked{% endif %}>
                        <span>{{ course.title }}</span>
                    </div>
                    {% endfor %}
                </div>

                <div class="counter">
                    Selected Courses: <span id="courseCount">0</span>
                </div>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-check"></i> Update Student
            </button>
        </form>

    </div>

</div>

<script>
function updateCourseCount() {
    let checked = document.querySelectorAll(".course-checkbox:checked").length;
    document.getElementById("courseCount").innerText = checked;
}

document.querySelectorAll(".course-checkbox").forEach(box => {
    box.addEventListener("change", updateCourseCount);
});

window.onload = updateCourseCount;
</script>

{% endblock %}
