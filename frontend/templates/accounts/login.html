{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body style="overflow: hidden;">

<div class="overlay"></div>

<div class="shape shape1"></div>
<div class="shape shape2"></div>

<header class="landing-header">
    <div class="nav-container">

        <a href="{% url 'index' %}" class="nav-logo">
            <img src="{% static 'accounts/images/spylogo.png' %}" class="logo-img">
            <span class="logo-text">LMS</span>
        </a>

        <button class="menu-toggle" id="menuToggle">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <nav class="nav-menu" id="navMenu">

            <a href="{% url 'index' %}" class="nav-link">Home</a>
            <a href="#" class="nav-link">Courses</a>
            <a href="#" class="nav-link">About</a>
            <a href="#" class="nav-link">Contact</a>

            <div class="mobile-nav-buttons">
                <a href="{% url 'login' %}" class="nav-btn-link">Login</a>
                <a href="{% url 'register' %}" class="nav-btn-pill">Register</a>
            </div>

        </nav>

        <div class="nav-buttons">
            <a href="{% url 'login' %}" class="nav-btn-link">Login</a>
            <a href="{% url 'register' %}" class="nav-btn-pill">Register</a>
        </div>

    </div>
</header>

<div class="auth-wrapper">

    <div class="card">

        <h2>Welcome Back</h2>

        <div class="card-subtitle">
            Sign in to continue
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <label>Email</label>

                <div class="field-container">

                    <i class="fas fa-envelope prefix-icon"></i>

                    {{ form.username }}

                </div>

            </div>

            <div class="form-group">

                <label>Password</label>

                <div class="field-container">

                    <i class="fas fa-lock prefix-icon"></i>

                    {{ form.password }}

                    <i class="fas fa-eye toggle-password"></i>

                </div>

            </div>

            <a href="{% url 'forgot_password' %}"
               class="forgot-password-link">
                Forgot Password?
            </a>

            <button type="submit" class="login-btn">
                Login <i class="fas fa-arrow-right"></i>
            </button>

        </form>

        <div class="or-divider">OR</div>

        <a href="{% provider_login_url 'google' %}"
           class="google-btn">

            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">

            Continue with Google

        </a>

        <a href="{% url 'register' %}" class="footer-link">
            Don't have an account?
            <span class="highlight">Register</span>
        </a>

    </div>

</div>

<script>

const togglePassword =
document.querySelector(".toggle-password");

const password =
document.querySelector("input[type='password']");

togglePassword.addEventListener("click", function(){

    const type =
    password.type === "password"
    ? "text"
    : "password";

    password.type = type;

    this.classList.toggle("fa-eye");
    this.classList.toggle("fa-eye-slash");

});

const menuToggle =
document.getElementById("menuToggle");

const navMenu =
document.getElementById("navMenu");

menuToggle.addEventListener("click", () => {

    navMenu.classList.toggle("active");

});

</script>

</body>
</html>
