{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}Add Trainer{% endblock %}

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="{% static 'accounts/css/add_trainer.css' %}">

<!-- Background gradient orbs -->
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<!-- Page wrapper to center form -->
<div class="page-wrapper">

    <div class="form-container">

            <div class="header-buttons">
                <a href="{% url 'manage_users' %}" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            </div>

            <h2 class="form-title">
                <i class="fas fa-chalkboard-teacher"></i> Add Trainer
            </h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                {{ form.email }}
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone</label>
                {{ form.phone }}
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                {{ form.password }}
            </div>

            <div class="form-group">
                <label><i class="fas fa-book"></i> Assign Courses</label>
                {{ form.courses }}
            </div>

            <div class="form-group">
                <label><i class="fas fa-user-graduate"></i> Assign Students</label>
                {{ form.students }}
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-plus-circle"></i> Create Trainer
            </button>

        </form>

    </div>

</div>

{% endblock %}
