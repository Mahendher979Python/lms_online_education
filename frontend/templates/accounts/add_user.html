{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}Add User{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="{% static 'accounts/css/add_user.css' %}?v=1.6">

<!-- Background gradient orbs -->
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<!-- Page wrapper to center form -->
<div class="page-wrapper">

    <div class="form-container">

            <div class="header-buttons">
                <a href="{% url 'view_users' %}" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            </div>

            <h2 class="form-title">
                <span><i class="fas fa-user-plus"></i> Add User (Trainer / Student)</span>
            </h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <div class="input-container">
                    <i class="fas fa-user input-icon"></i>
                    {{ form.username }}
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-container">
                    <i class="fas fa-envelope input-icon"></i>
                    {{ form.email }}
                </div>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <div class="input-container">
                    <i class="fas fa-phone input-icon"></i>
                    {{ form.phone }}
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-container">
                    <i class="fas fa-lock input-icon"></i>
                    {{ form.password }}
                </div>
            </div>

            <div class="form-group">
                <label>Role</label>
                <div class="input-container">
                    <i class="fas fa-user-tag input-icon"></i>
                    {{ form.role }}
                </div>
            </div>

            <!-- COURSES -->
            <div class="form-group" id="courseBox" style="display:none;">
                <label>Select Course</label>
                <div class="input-container">
                    <i class="fas fa-book input-icon"></i>
                    <select name="courses">
                        {% for c in courses %}
                            <option value="{{ c.id }}">{{ c.title }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- TRAINERS -->
            <div class="form-group" id="trainerBox" style="display:none;">
                <label>Select Trainer</label>
                <div class="input-container">
                    <i class="fas fa-chalkboard-teacher input-icon"></i>
                    <select name="trainer">
                        {% for t in trainers %}
                            <option value="{{ t.id }}">{{ t.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- STUDENTS -->
            <div class="form-group" id="studentBox" style="display:none;">
                <label>Select Student</label>
                <div class="input-container">
                    <i class="fas fa-user-graduate input-icon"></i>
                    <select name="student">
                        {% for s in students %}
                            <option value="{{ s.id }}">{{ s.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit" class="btn">
                Create User <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>

        </form>

        <a href="{% url 'view_users' %}" class="link">View Users</a>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let roleField = document.querySelector("[name='role']");
    
    let courseBox = document.getElementById("courseBox");
    let trainerBox = document.getElementById("trainerBox");
    let studentBox = document.getElementById("studentBox");

    function updateFields() {
        let role = roleField.value;

        courseBox.style.display = "none";
        trainerBox.style.display = "none";
        studentBox.style.display = "none";

        if (role === "trainer") {
            courseBox.style.display = "block";
            studentBox.style.display = "block";
        }

        if (role === "student") {
            courseBox.style.display = "block";
            trainerBox.style.display = "block";
        }
    }

    roleField.addEventListener("change", updateFields);
    updateFields(); // run on load
});
</script>

{% endblock %}
